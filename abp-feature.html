<!--
  ABP FEATURED ALBUM WIDGET
  ─────────────────────────
  Drop this block into any page. Reads albums.csv and scores.csv
  from the same directory. Fetches cover art from Last.fm.

  Dependencies (add to your page's <head> if not already present):
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
-->

<style>
  .abp-feature {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 24px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: #1a1a1a;
  }
  .abp-feature-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #3d5a80;
    border: 1px solid #3d5a80;
    padding: 4px 12px;
    opacity: 0.8;
    margin-bottom: 20px;
  }
  .abp-feature-art {
    position: relative;
    width: 200px;
    height: 200px;
    background: #f5f5f5;
    border: 1px solid #d8d4cc;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .abp-feature-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  .abp-feature-shimmer {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #e8e5df 25%, #d8d4cc 50%, #e8e5df 75%);
    background-size: 200% 100%;
    animation: abp-shimmer 1.4s infinite;
  }
  @keyframes abp-shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }
  .abp-feature-artist {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: #888;
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .abp-feature-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.04em;
    color: #1a1a1a;
    line-height: 1;
    margin-bottom: 4px;
  }
  .abp-feature-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: #aaa;
    margin-bottom: 6px;
  }
  .abp-feature-person {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    color: #3d5a80;
    margin-bottom: 16px;
    letter-spacing: 0.06em;
  }
  .abp-feature-avg {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #555;
    margin-bottom: 16px;
  }
  .abp-feature-avg strong {
    font-size: 1rem;
    color: #3d5a80;
  }
  .abp-feature-links {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .abp-feature-links a {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 20px;
    text-decoration: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: filter 0.15s, transform 0.15s;
  }
  .abp-feature-links a:hover { filter: brightness(1.1); transform: scale(1.04); }
  .abp-feature-links a svg { width: 12px; height: 12px; flex-shrink: 0; }
  .abp-feat-spotify { background: #1DB954; color: #000; }
  .abp-feat-apple   { background: #fc3c44; color: #fff; }
  .abp-feature-error {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: #aaa;
    padding: 24px;
  }
</style>

<div class="abp-feature" id="abp-feature">
  <div class="abp-feature-error">Loading…</div>
</div>

<script>
(async function abpFeature() {
  const LFM_KEY = '87a20f2bb27ac8fc160a67d6d6655e68';
  const el = document.getElementById('abp-feature');

  const SPOTIFY_ICON = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;
  const APPLE_ICON   = `<svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="m10.995 0 .573.001q.241 0 .483.007c.35.01.705.03 1.051.093.352.063.68.166.999.329a3.36 3.36 0 0 1 1.47 1.468c.162.32.265.648.328 1 .063.347.084.7.093 1.051q.007.241.007.483l.001.573v5.99l-.001.573q0 .241-.008.483c-.01.35-.03.704-.092 1.05a3.5 3.5 0 0 1-.33 1 3.36 3.36 0 0 1-1.468 1.468 3.5 3.5 0 0 1-1 .33 7 7 0 0 1-1.05.092q-.241.007-.483.008l-.573.001h-5.99l-.573-.001q-.241 0-.483-.008a7 7 0 0 1-1.052-.092 3.6 3.6 0 0 1-.998-.33 3.36 3.36 0 0 1-1.47-1.468 3.6 3.6 0 0 1-.328-1 7 7 0 0 1-.093-1.05Q.002 11.81 0 11.568V5.005l.001-.573q0-.241.007-.483c.01-.35.03-.704.093-1.05a3.6 3.6 0 0 1 .329-1A3.36 3.36 0 0 1 1.9.431 3.5 3.5 0 0 1 2.896.1 7 7 0 0 1 3.95.008Q4.19.002 4.432 0h.573zm-.107 2.518-4.756.959H6.13a.66.66 0 0 0-.296.133.5.5 0 0 0-.16.31c-.004.027-.01.08-.01.16v5.952c0 .14-.012.275-.106.39-.095.115-.21.15-.347.177l-.31.063c-.393.08-.65.133-.881.223a1.4 1.4 0 0 0-.519.333 1.25 1.25 0 0 0-.332.995c.031.297.166.582.395.792.156.142.35.25.578.296.236.047.49.031.858-.043.196-.04.38-.102.555-.205a1.4 1.4 0 0 0 .438-.405 1.5 1.5 0 0 0 .233-.55c.042-.202.052-.386.052-.588V6.347c0-.276.08-.35.302-.404.024-.005 3.954-.797 4.138-.833.257-.049.378.025.378.294v3.524c0 .14-.001.28-.096.396-.094.115-.211.15-.348.178l-.31.062c-.393.08-.649.133-.88.223a1.4 1.4 0 0 0-.52.334 1.26 1.26 0 0 0-.34.994c.03.297.174.582.404.792a1.2 1.2 0 0 0 .577.294c.237.048.49.03.858-.044.197-.04.381-.098.556-.202a1.4 1.4 0 0 0 .438-.405q.173-.252.233-.549a2.7 2.7 0 0 0 .044-.589V2.865c0-.273-.143-.443-.4-.42-.04.003-.383.064-.424.073"/></svg>`;

  // ── Parse CSVs ───────────────────────────────────────────────
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
    const col = h => headers.indexOf(h);
    const iP = col('person'), iR = col('round'), iW = col('week'),
          iT = col('title'),  iA = col('artist'), iY = col('year');
    return lines.slice(1).map(line => {
      const fields = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      fields.push(cur.trim());
      return {
        person: fields[iP] || '',
        round:  parseInt(fields[iR], 10) || 1,
        week:   parseInt(fields[iW], 10) || null,
        title:  fields[iT] || '',
        artist: fields[iA] || '',
        year:   parseInt(fields[iY], 10) || null,
      };
    }).filter(r => r.person && r.title && r.artist);
  }

  function parseScoresCSV(text) {
    const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
    const headers = lines[0].split(',').map(h => h.trim());
    const artistIdx = headers.findIndex(h => h.toLowerCase() === 'artist');
    const amendIdx  = headers.findIndex(h => h.toLowerCase() === 'amend');
    const scoreHeaders = headers.filter((h, i) => i !== 0 && i !== artistIdx && i !== amendIdx);
    const grouped = new Map();
    lines.slice(1).forEach(line => {
      const fields = line.split(',').map(f => f.trim());
      const week   = parseInt(fields[0], 10);
      if (!week) return;
      const artist = artistIdx >= 0 ? (fields[artistIdx] || '').toLowerCase() : '';
      const amend  = amendIdx  >= 0 ? (parseInt(fields[amendIdx], 10) || 0) : 0;
      const key    = artist ? `${week}|${artist}` : String(week);
      const entry  = {};
      scoreHeaders.forEach(h => {
        const v = fields[headers.indexOf(h)];
        entry[h] = v !== '' && v !== undefined ? parseFloat(v) : null;
      });
      if (!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push({ amend, entry });
    });
    const scores = new Map();
    grouped.forEach((revisions, key) => {
      revisions.sort((a, b) => a.amend - b.amend);
      const merged = {};
      revisions.forEach(({ entry }) => {
        scoreHeaders.forEach(h => {
          if (entry[h] !== null) merged[h] = entry[h];
          else if (!(h in merged)) merged[h] = null;
        });
      });
      scores.set(key, merged);
    });
    return scores;
  }

  // ── Fetch cover from Last.fm ─────────────────────────────────
  async function fetchCover(artist, title) {
    try {
      const url = `https://ws.audioscrobbler.com/2.0/?method=album.getinfo&api_key=${LFM_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(title)}&format=json`;
      const res = await fetch(url);
      if (!res.ok) return null;
      const data = await res.json();
      const images = data?.album?.image;
      if (!Array.isArray(images)) return null;
      for (const size of ['extralarge', 'large', 'medium']) {
        const found = images.find(i => i.size === size);
        if (found?.['#text']) return found['#text'].replace(/^http:\/\//, 'https://');
      }
    } catch {}
    return null;
  }

  // ── Fetch Spotify link from MusicBrainz ─────────────────────
  async function fetchSpotify(artist, title) {
    try {
      const q = encodeURIComponent(`artist:"${artist}" release:"${title}"`);
      const res = await fetch(`https://musicbrainz.org/ws/2/release/?query=${q}&limit=5&fmt=json`);
      if (!res.ok) return null;
      for (const rel of (await res.json()).releases?.slice(0, 5) ?? []) {
        try {
          const r = await fetch(`https://musicbrainz.org/ws/2/release/${rel.id}?inc=url-rels&fmt=json`);
          if (!r.ok) continue;
          for (const { url: u } of (await r.json()).relations ?? []) {
            if (u?.resource?.includes('open.spotify.com/album')) return u.resource;
          }
        } catch { continue; }
      }
    } catch {}
    return `https://open.spotify.com/search/${encodeURIComponent(artist + ' ' + title)}`;
  }

  // ── Boot ─────────────────────────────────────────────────────
  try {
    const [albumsRes, scoresRes] = await Promise.all([
      fetch('albums.csv?v=' + Date.now()),
      fetch('scores.csv?v=' + Date.now()).catch(() => null),
    ]);
    if (!albumsRes.ok) throw new Error('Could not load albums.csv');

    const rows   = parseCSV(await albumsRes.text());
    const scores = scoresRes?.ok ? parseScoresCSV(await scoresRes.text()) : new Map();

    // Find pick with highest week number
    const pick = rows.reduce((best, r) => (!best || (r.week ?? 0) > (best.week ?? 0)) ? r : best, null);
    if (!pick) throw new Error('No picks found');

    // Get avg score if available
    const weekScores = scores.get(`${pick.week}|${pick.artist.toLowerCase()}`) ?? scores.get(String(pick.week));
    let avg = null;
    if (weekScores) {
      const vals = Object.values(weekScores).filter(v => v !== null);
      if (vals.length) avg = (vals.reduce((s, v) => s + v, 0) / vals.length).toFixed(2);
    }

    // Render shell immediately
    el.innerHTML = `
      <div class="abp-feature-label">This Week's Album</div>
      <div class="abp-feature-art">
        <div class="abp-feature-shimmer" id="abp-shimmer"></div>
        <img id="abp-img" alt="${pick.artist} – ${pick.title}"/>
      </div>
      <div class="abp-feature-artist">${pick.artist.toUpperCase()}</div>
      <div class="abp-feature-title">${pick.title}</div>
      ${pick.year ? `<div class="abp-feature-year">${pick.year}</div>` : ''}
      <div class="abp-feature-person">picked by ${pick.person}</div>
      ${avg ? `<div class="abp-feature-avg">avg score <strong>${avg}</strong></div>` : ''}
      <div class="abp-feature-links" id="abp-links">
        <span style="font-family:'DM Mono',monospace;font-size:0.6rem;color:#aaa;">…</span>
      </div>
    `;

    // Fetch cover + Spotify in parallel
    const [cover, spotify] = await Promise.all([
      fetchCover(pick.artist, pick.title),
      fetchSpotify(pick.artist, pick.title),
    ]);

    if (cover) {
      const img = document.getElementById('abp-img');
      img.onload = () => {
        img.style.display = 'block';
        document.getElementById('abp-shimmer').style.display = 'none';
      };
      img.src = cover;
    } else {
      document.getElementById('abp-shimmer').style.display = 'none';
    }

    const appleSearch = `https://music.apple.com/search?term=${encodeURIComponent(pick.artist + ' ' + pick.title)}`;
    document.getElementById('abp-links').innerHTML = `
      <a class="abp-feat-spotify" href="${spotify}" target="_blank" rel="noopener">${SPOTIFY_ICON} Spotify</a>
      <a class="abp-feat-apple"   href="${appleSearch}" target="_blank" rel="noopener">${APPLE_ICON} Apple Music</a>
    `;

  } catch (e) {
    el.innerHTML = `<div class="abp-feature-error">Could not load album data.</div>`;
    console.error('ABP widget:', e);
  }
})();
</script>
