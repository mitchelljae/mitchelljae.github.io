<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ABP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --surface:    #141414;
      --border:     #222;
      --accent:     #e8ff00;
      --muted:      #6e6e6e;
      --text:       #e8e8e8;
      --label:      #888;
      --gap:        4px;
      --shimmer-a:  #1a1a1a;
      --shimmer-b:  #272727;
      --badge-text: #000;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:         #f2f0eb;
        --surface:    #ffffff;
        --border:     #ddd;
        --accent:     #7a6f00;
        --muted:      #bbb;
        --text:       #1a1a1a;
        --label:      #666;
        --shimmer-a:  #e8e5df;
        --shimmer-b:  #d8d4cc;
        --badge-text: #fff;
      }
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      padding: 48px 48px 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .header-text { display: flex; flex-direction: column; gap: 4px; }
    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 5vw, 4.5rem);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--accent);
    }
    header .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── MAIN ── */
    main { padding: 0 48px 60px; }

    /* ── FEATURED ── */
    .featured {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 48px 52px;
    }
    .featured-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .featured-art {
      position: relative;
      width: 220px;
      height: 220px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 20px;
      flex-shrink: 0;
    }
    .featured-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .featured-art .shimmer { width: 100%; height: 100%; }
    .featured-artist {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.05em;
    }
    .featured-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 6px;
    }
    .featured-person {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--accent);
      margin-bottom: 18px;
      letter-spacing: 0.06em;
    }
    .featured-links {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .featured-links a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      transition: filter 0.15s, transform 0.15s;
    }
    .featured-links a:hover { filter: brightness(1.15); transform: scale(1.04); }
    .featured-links a svg { width: 12px; height: 12px; flex-shrink: 0; }
    .featured-links .feat-spotify { background: #1DB954; color: #000; }
    .featured-links .feat-apple   { background: #fc3c44; color: #fff; }
    .featured-links-pending {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
    }

    /* ── ROUND GRID ── */
    .rounds-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: var(--gap);
    }

    /* ── ALBUM CARD ── */
    .album-card {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: default;
    }
    .album-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      transition: transform 0.3s ease, filter 0.3s ease;
      filter: saturate(0.85);
    }
    @media (prefers-color-scheme: light) {
      .album-card img { filter: saturate(1); }
    }
    .album-card:hover img { transform: scale(1.06); filter: saturate(1.1); }

    .album-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 55%);
      opacity: 0;
      transition: opacity 0.22s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
      pointer-events: none;
    }
    .album-card:hover .album-overlay { opacity: 1; }
    .album-overlay .ov-person {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .album-overlay .ov-title  { font-size: 0.68rem; font-weight: 400; color: #fff; line-height: 1.2; }
    .album-overlay .ov-artist { font-size: 0.62rem; color: rgba(255,255,255,0.65); }
    .album-overlay .ov-year   { font-family: 'DM Mono', monospace; font-size: 0.55rem; color: var(--accent); margin-top: 2px; }

    /* ── EMPTY CARD ── */
    .album-card--empty { border-style: dashed; opacity: 0.28; }
    .empty-slot {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
    }

    /* ── IMAGE ERROR PLACEHOLDER ── */
    .album-card .placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      font-size: 1.2rem;
    }

    /* ── SPLIT CARD (double submission) ──
       Accent border flags it. Diagonal seam via ::after.
       Two clip-path halves hold each cover independently. */
    .album-card--split {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--accent);
      cursor: default;
    }
    .album-card--split::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        135deg,
        transparent calc(50% - 1px),
        rgba(0,0,0,0.75) calc(50% - 1px),
        rgba(0,0,0,0.75) calc(50% + 1px),
        transparent calc(50% + 1px)
      );
      z-index: 2;
      pointer-events: none;
    }
    .split-half {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
    }
    .split-half--a { clip-path: polygon(0 0, 100% 0, 0 100%); }
    .split-half--b { clip-path: polygon(100% 0, 100% 100%, 0 100%); }
    .split-half img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      filter: saturate(0.85);
      transition: filter 0.3s ease;
    }
    .split-half .shimmer { width: 100%; height: 100%; }

    .split-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      opacity: 0;
      transition: opacity 0.22s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      padding: 10px;
      pointer-events: none;
      z-index: 3;
    }
    .album-card--split:hover .split-overlay { opacity: 1; }
    .album-card--split:hover .split-half img { filter: saturate(0.3) brightness(0.4); }
    .split-overlay .ov-person {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: var(--accent);
      margin-bottom: 3px;
      letter-spacing: 0.05em;
    }
    .split-entry {
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 4px 6px;
      background: rgba(255,255,255,0.05);
      border-left: 2px solid var(--accent);
    }
    .split-entry .ov-title  { font-size: 0.64rem; font-weight: 400; color: #fff; line-height: 1.2; }
    .split-entry .ov-artist { font-size: 0.57rem; color: rgba(255,255,255,0.55); }
    .split-entry .ov-year   { font-family: 'DM Mono', monospace; font-size: 0.52rem; color: var(--accent); }

    /* ── SHIMMER ── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .shimmer {
      background: linear-gradient(90deg, var(--shimmer-a) 25%, var(--shimmer-b) 50%, var(--shimmer-a) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    /* ── ROUND DIVIDER ── */
    .round-divider {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 6px;
    }
    .round-divider:first-child { padding-top: 0; }
    .round-divider span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .round-divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }

    /* ── TABLE ── */
    .table-section { padding: 0 48px 80px; }
    .table-section h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.06em;
      color: var(--text);
      margin-bottom: 20px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .picks-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .picks-table thead tr { border-bottom: 2px solid var(--accent); }
    .picks-table th {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--accent);
      text-align: left;
      padding: 8px 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .picks-table th:first-child { width: 56px; }
    .picks-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .picks-table tbody tr:hover      { background: var(--surface); }
    .picks-table tbody tr.row-double { border-left: 2px solid var(--accent); }
    .picks-table td {
      padding: 3px 12px;
      vertical-align: middle;
      color: var(--text);
    }
    .picks-table td:first-child { padding: 4px 6px; width: 56px; }

    .table-thumb {
      display: none;
      width: 44px; height: 44px;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .table-thumb-shimmer { width: 44px; height: 44px; }

    .td-week, .td-round, .td-year { font-family: 'DM Mono', monospace; font-size: 0.65rem; }
    .td-week   { color: var(--muted); }
    .td-round  { color: var(--label); }
    .td-year   { color: var(--muted); font-size: 0.7rem; }
    .td-person { font-weight: 400; }
    .td-artist { color: var(--label); }
    .td-album  { font-weight: 400; }
    .td-genre  { color: var(--label); font-size: 0.75rem; }
    .td-avg    { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--accent); font-weight: 400; }

    .td-double-badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      background: var(--accent);
      color: var(--badge-text);
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0.05em;
    }

    /* ── EXPANDABLE SCORE ROW ── */
    .picks-table tr.has-scores { cursor: pointer; }
    .picks-table tr.has-scores:hover { background: var(--surface); }
    .picks-table tr.row-expanded { background: var(--surface); }

    .score-row td {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .score-row-inner {
      display: none;
      padding: 10px 16px 12px;
      overflow: hidden;
    }
    .score-row-inner.visible { display: flex; flex-wrap: wrap; gap: 8px 36px; }
    .score-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .score-chip .chip-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
    .score-chip .chip-value {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 400;
    }
    .score-chip .chip-value.chip-none { color: var(--muted); }

    /* ── SORTABLE HEADERS ── */
    .picks-table th.sortable {
      cursor: pointer;
      user-select: none;
    }
    .picks-table th.sortable:hover { color: var(--text); }
    .picks-table th.sortable::after {
      content: ' ⇅';
      opacity: 0.3;
      font-size: 0.6rem;
    }
    .picks-table th.sort-asc::after  { content: ' ↑'; opacity: 1; }
    .picks-table th.sort-desc::after { content: ' ↓'; opacity: 1; }

    /* ── ROW HIGHLIGHT (scroll target) ── */
    @keyframes rowflash {
      0%   { background: color-mix(in srgb, var(--accent) 18%, transparent); }
      100% { background: transparent; }
    }
    .picks-table tbody tr.row-highlight { animation: rowflash 1.2s ease-out forwards; }

    /* ── CLICKABLE CARDS ── */
    .album-card.is-linked,
    .album-card--split.is-linked { cursor: pointer; }

    /* ── STATS ── */
    .stats-section {
      padding: 0 48px 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 32px 48px;
    }
    .stat-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .stat-item strong {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      line-height: 1;
      color: var(--accent);
      font-weight: 400;
    }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      header         { padding: 24px 16px 20px; }
      main           { padding: 0 16px 40px; }
      .featured      { padding: 0 16px 36px; }
      .table-section { padding: 0 0 60px; }
      .table-section h2 { padding-left: 16px; }
      .stats-section { padding: 0 16px 40px; gap: 24px 32px; }

      /* Scrollable table wrapper */
      .table-section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .picks-table   { font-size: 0.75rem; min-width: 480px; }

      /* Smaller thumbnail */
      .table-thumb,
      .table-thumb-shimmer { width: 32px; height: 32px; }
      .picks-table td:first-child { width: 40px; }

      /* Hide lower-priority columns on small screens */
      .picks-table .col-round,
      .picks-table .col-genre,
      .picks-table .col-year,
      .picks-table thead th:first-child,
      .picks-table tbody tr:not(.score-row) td:first-child { display: none; }

      /* Stats wrap to 2 per row */
      .stat-item { flex: 1 1 calc(50% - 16px); min-width: 120px; }
      .stat-item strong { font-size: 1.6rem; }

      /* Score chips smaller on mobile */
      .score-row-inner.visible { gap: 6px 20px; }
      .score-chip .chip-value  { font-size: 0.7rem; }
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="header-text">
    <h1>ABP</h1>
    <span class="subtitle">Last Updated: <span id="last-updated"></span></span>
  </div>
</header>

<div id="featured"></div>
<main id="app"></main>
<div class="table-section" id="table-section"></div>
<div class="stats-section" id="stats-section"></div>
<footer id="footer">ABP · <span id="footer-year"></span> · covers via MusicBrainz / Cover Art Archive</footer>

<script>
// ============================================================
//  CSV PARSER
//  Converts a CSV string into the COLLECTION structure.
//
//  Columns: person, round, week, title, artist, year, double, note
//  double: 1/true = double submission (split card), 0/false = single
//  note:   optional, ignored by renderer
// ============================================================
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
  const col = h => headers.indexOf(h);
  const iP = col('person'), iR = col('round'), iW = col('week'),
        iT = col('title'),  iA = col('artist'), iY = col('year'),
        iD = col('double'), iN = col('note'),   iG = col('group'), iGn = col('genre'), iDc = col('decade');

  const rows = lines.slice(1).map(line => {
    const fields = [];
    let cur = '', inQuote = false;
    for (const ch of line) {
      if (ch === '"')                  { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { fields.push(cur.trim()); cur = ''; }
      else                             { cur += ch; }
    }
    fields.push(cur.trim());
    return {
      person: fields[iP] || '',
      round:  parseInt(fields[iR], 10) || 1,
      week:   parseInt(fields[iW], 10) || null,
      title:  fields[iT] || '',
      artist: fields[iA] || '',
      year:   parseInt(fields[iY], 10) || null,
      double: ['true', '1'].includes((fields[iD] || '').toLowerCase().trim()),
      note:   iN  >= 0 ? (fields[iN]  || '') : '',
      group:  iG  >= 0 ? (fields[iG]  || '').trim() : '',
      genre:  iGn >= 0 ? (fields[iGn] || '').trim() : '',
      decade: iDc >= 0 ? (fields[iDc] || '').trim() : '',
    };
  }).filter(r => r.person && r.title && r.artist);

  const personOrder = [...new Set(rows.map(r => r.person))];
  const roundCount  = Math.max(...rows.map(r => r.round));

  return personOrder.map(person => {
    const picks = [];
    for (let r = 1; r <= roundCount; r++) {
      const rr = rows.filter(row => row.person === person && row.round === r);
      if (!rr.length) {
        picks.push(null);
      } else if (rr.length === 1 && !rr[0].double) {
        const { title, artist, year, week, note, group, genre, decade } = rr[0];
        picks.push({ title, artist, year, week, ...(note ? { note } : {}), ...(group !== '' ? { group } : {}), ...(genre ? { genre } : {}), ...(decade ? { decade } : {}) });
      } else {
        picks.push(rr.map(({ title, artist, year, week, note, group, genre, decade }) => ({
          title, artist, year, week, ...(note ? { note } : {}), ...(group !== '' ? { group } : {}), ...(genre ? { genre } : {}), ...(decade ? { decade } : {})
        })));
      }
    }
    return { person, picks };
  });
}

// ── SCORES CSV PARSER ────────────────────────────────────────
// Returns a Map keyed by "week|artist" → { col: value, ... }
// If artist column is absent, falls back to keying by week alone.
function parseScoresCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim());
  const artistIdx = headers.findIndex(h => h.toLowerCase() === 'artist');
  const scoreHeaders = headers.filter((h, i) => i !== 0 && i !== artistIdx);
  const scores = new Map();

  lines.slice(1).forEach(line => {
    const fields = line.split(',').map(f => f.trim());
    const week   = parseInt(fields[0], 10);
    if (!week) return;
    const artist = artistIdx >= 0 ? (fields[artistIdx] || '').toLowerCase() : '';
    const key    = artist ? `${week}|${artist}` : String(week);
    const entry  = {};
    scoreHeaders.forEach(h => {
      const i   = headers.indexOf(h);
      const val = fields[i];
      entry[h]  = val !== '' && val !== undefined ? parseFloat(val) : null;
    });
    scores.set(key, entry);
  });
  return scores;
}

// ── BOOT ─────────────────────────────────────────────────────
(async function boot() {
  const app = document.getElementById('app');
  app.innerHTML = `<div style="padding:48px;font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted);">loading…</div>`;

  try {
    const [albumsRes, scoresRes] = await Promise.all([
      fetch('albums.csv?v=' + Date.now()),
      fetch('scores.csv?v=' + Date.now()),
    ]);
    if (!albumsRes.ok) throw new Error(`Could not load albums.csv (HTTP ${albumsRes.status})`);
    const scores = scoresRes.ok ? parseScoresCSV(await scoresRes.text()) : new Map();
    app.innerHTML = '';
    render(parseCSV(await albumsRes.text()), scores);
  } catch (e) {
    console.error(e);
    app.innerHTML = `
      <div style="padding:48px;font-family:'DM Mono',monospace;font-size:0.8rem;color:#e05;">
        ✕ ${e.message}<br><br>
        <span style="color:var(--muted)">Make sure albums.csv and scores.csv are in the same directory as index.html.</span>
      </div>`;
  }
})();
</script>

<script>
function render(COLLECTION, SCORES = new Map()) {

  // ── HELPERS ─────────────────────────────────────────────────
  const isDouble = pick => Array.isArray(pick);
  const toArray  = pick => isDouble(pick) ? pick : [pick];

  const SPOTIFY_ICON = `<svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;
  const APPLE_ICON   = `<svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="m10.995 0 .573.001q.241 0 .483.007c.35.01.705.03 1.051.093.352.063.68.166.999.329a3.36 3.36 0 0 1 1.47 1.468c.162.32.265.648.328 1 .063.347.084.7.093 1.051q.007.241.007.483l.001.573v5.99l-.001.573q0 .241-.008.483c-.01.35-.03.704-.092 1.05a3.5 3.5 0 0 1-.33 1 3.36 3.36 0 0 1-1.468 1.468 3.5 3.5 0 0 1-1 .33 7 7 0 0 1-1.05.092q-.241.007-.483.008l-.573.001h-5.99l-.573-.001q-.241 0-.483-.008a7 7 0 0 1-1.052-.092 3.6 3.6 0 0 1-.998-.33 3.36 3.36 0 0 1-1.47-1.468 3.6 3.6 0 0 1-.328-1 7 7 0 0 1-.093-1.05Q.002 11.81 0 11.568V5.005l.001-.573q0-.241.007-.483c.01-.35.03-.704.093-1.05a3.6 3.6 0 0 1 .329-1A3.36 3.36 0 0 1 1.9.431 3.5 3.5 0 0 1 2.896.1 7 7 0 0 1 3.95.008Q4.19.002 4.432 0h.573zm-.107 2.518-4.756.959H6.13a.66.66 0 0 0-.296.133.5.5 0 0 0-.16.31c-.004.027-.01.08-.01.16v5.952c0 .14-.012.275-.106.39-.095.115-.21.15-.347.177l-.31.063c-.393.08-.65.133-.881.223a1.4 1.4 0 0 0-.519.333 1.25 1.25 0 0 0-.332.995c.031.297.166.582.395.792.156.142.35.25.578.296.236.047.49.031.858-.043.196-.04.38-.102.555-.205a1.4 1.4 0 0 0 .438-.405 1.5 1.5 0 0 0 .233-.55c.042-.202.052-.386.052-.588V6.347c0-.276.08-.35.302-.404.024-.005 3.954-.797 4.138-.833.257-.049.378.025.378.294v3.524c0 .14-.001.28-.096.396-.094.115-.211.15-.348.178l-.31.062c-.393.08-.649.133-.88.223a1.4 1.4 0 0 0-.52.334 1.26 1.26 0 0 0-.34.994c.03.297.174.582.404.792a1.2 1.2 0 0 0 .577.294c.237.048.49.03.858-.044.197-.04.381-.098.556-.202a1.4 1.4 0 0 0 .438-.405q.173-.252.233-.549a2.7 2.7 0 0 0 .044-.589V2.865c0-.273-.143-.443-.4-.42-.04.003-.383.064-.424.073"/></svg>`;

  // ── CACHE ────────────────────────────────────────────────────
  const b64      = s     => btoa(unescape(encodeURIComponent(s))).replace(/[^a-zA-Z0-9]/g, '');
  const covKey   = (a,t,size='large') => `lfm_v1_${size}_` + b64(`${a}||${t}`);
  const spotKey  = (a,t) => 'mbspot_v1_'  + b64(`${a}||${t}`);
  const appleKey = (a,t) => 'mbapple_v1_' + b64(`${a}||${t}`);
  const cacheKey = covKey;

  const getLS = k    => { try { return localStorage.getItem(k);    } catch { return null; } };
  const setLS = (k,v) => { try { localStorage.setItem(k, v);       } catch {} };

  const spotifySearchUrl    = (a,t) => `https://open.spotify.com/search/${encodeURIComponent(a+' '+t)}`;
  const appleMusicSearchUrl = (a,t) => `https://music.apple.com/search?term=${encodeURIComponent(a+' '+t)}`;

  const LFM_KEY = '87a20f2bb27ac8fc160a67d6d6655e68';

  // Last.fm returns images in sizes: small, medium, large, extralarge, mega
  // We want extralarge (300px) — swap to mega (600px) if preferred
  function lfmBestImage(images, prefer = 'large') {
    if (!Array.isArray(images)) return null;
    const order = prefer === 'extralarge'
      ? ['extralarge', 'mega', 'large', 'medium', 'small']
      : ['large', 'extralarge', 'mega', 'medium', 'small'];
    for (const size of order) {
      const found = images.find(i => i.size === size);
      if (found?.['#text']) return found['#text'].replace(/^http:\/\//, 'https://');
    }
    return null;
  }

  // ── API FETCH ────────────────────────────────────────────────
  // Cover: Last.fm album.getInfo (single call, fast, no rate limit issues)
  // Links: MusicBrainz release url-rels (Spotify / Apple Music live here)
  async function fetchAlbumData(artist, title, size = 'large') {
    const cc = getLS(covKey(artist, title, size));
    const sc = getLS(spotKey(artist, title));
    const ac = getLS(appleKey(artist, title));

    if (cc !== null && sc !== null && ac !== null) {
      return {
        cover:   cc === 'NONE' ? null : cc,
        spotify: sc === 'NONE' ? spotifySearchUrl(artist, title)   : sc,
        apple:   ac === 'NONE' ? appleMusicSearchUrl(artist, title) : ac,
      };
    }

    try {
      let cover = null, spotify = null, apple = null;

      // Last.fm → cover art
      if (cc === null) {
        try {
          const url = `https://ws.audioscrobbler.com/2.0/?method=album.getinfo&api_key=${LFM_KEY}&artist=${encodeURIComponent(artist)}&album=${encodeURIComponent(title)}&format=json`;
          const res = await fetch(url);
          if (res.ok) {
            const data = await res.json();
            cover = lfmBestImage(data?.album?.image, size) || null;
          }
        } catch {}
      } else {
        cover = cc === 'NONE' ? null : cc;
      }

      // MusicBrainz → Spotify + Apple Music links
      if (sc === null || ac === null) {
        try {
          const q = encodeURIComponent(`artist:"${artist}" release:"${title}"`);
          const res = await fetch(`https://musicbrainz.org/ws/2/release/?query=${q}&limit=5&fmt=json`);
          if (res.ok) {
            for (const rel of (await res.json()).releases?.slice(0, 5) ?? []) {
              if (spotify && apple) break;
              try {
                const r = await fetch(`https://musicbrainz.org/ws/2/release/${rel.id}?inc=url-rels&fmt=json`);
                if (!r.ok) continue;
                for (const { url: u } of (await r.json()).relations ?? []) {
                  const href = u?.resource || '';
                  if (!spotify && href.includes('open.spotify.com/album')) spotify = href;
                  if (!apple   && (href.includes('music.apple.com') || href.includes('itunes.apple.com'))) apple = href;
                }
              } catch { continue; }
            }
          }
        } catch {}
      } else {
        spotify = sc === 'NONE' ? null : sc;
        apple   = ac === 'NONE' ? null : ac;
      }

      setLS(covKey(artist, title, size), cover   || 'NONE');
      setLS(spotKey(artist, title),  spotify || 'NONE');
      setLS(appleKey(artist, title), apple   || 'NONE');

      return {
        cover,
        spotify: spotify || spotifySearchUrl(artist, title),
        apple:   apple   || appleMusicSearchUrl(artist, title),
      };
    } catch (e) {
      console.warn(`fetchAlbumData: ${artist} – ${title}:`, e.message);
      return { cover: null, spotify: spotifySearchUrl(artist, title), apple: appleMusicSearchUrl(artist, title) };
    }
  }

  // ── APPLY FUNCTIONS ──────────────────────────────────────────
  function applyCovers(key, url) {
    if (!url) return;
    document.querySelectorAll(`img[data-key="${key}"]`).forEach(img => {
      img.onload = () => {
        img.style.display = 'block';
        const s = img.previousElementSibling;
        if (s?.classList.contains('shimmer')) s.style.display = 'none';
      };
      img.onerror = () => {
        const s = img.previousElementSibling;
        if (s?.classList.contains('shimmer')) s.style.display = 'none';
      };
      img.src = url;
    });
  }

  function applySpotify(key, url) {
    if (!url) return;
    document.querySelectorAll(`.ov-spotify-slot[data-spotkey="${key}"]`).forEach(s => {
      s.innerHTML = `<a class="ov-spotify" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${SPOTIFY_ICON} Spotify</a>`;
    });
    document.querySelectorAll(`.td-spotify[data-spotkey="${key}"]`).forEach(c => {
      c.innerHTML = `<a href="${url}" target="_blank" rel="noopener">${SPOTIFY_ICON} Listen</a>`;
    });
    updateFeaturedLinks(key);
  }

  function applyAppleMusic(key, url) {
    if (!url) return;
    document.querySelectorAll(`.ov-apple-slot[data-spotkey="${key}"]`).forEach(s => {
      s.innerHTML = `<a class="ov-apple" href="${url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${APPLE_ICON} Apple Music</a>`;
    });
    document.querySelectorAll(`.td-apple[data-spotkey="${key}"]`).forEach(c => {
      c.innerHTML = `<a href="${url}" target="_blank" rel="noopener">${APPLE_ICON} Listen</a>`;
    });
    updateFeaturedLinks(key);
  }

  function updateFeaturedLinks(key) {
    const el = document.querySelector(`.featured-links[data-spotkey="${key}"]`);
    if (!el) return;
    const m = keyMeta.get(key);
    if (!m) return;
    const { artist, title } = m;
    const sc = getLS(spotKey(artist, title));
    const ac = getLS(appleKey(artist, title));
    const su = sc !== null ? (sc === 'NONE' ? spotifySearchUrl(artist, title)   : sc) : null;
    const au = ac !== null ? (ac === 'NONE' ? appleMusicSearchUrl(artist, title) : ac) : null;
    const sw = el.querySelector('.feat-spot-wrap');
    const aw = el.querySelector('.feat-apple-wrap');
    if (sw && su) sw.innerHTML = `<a class="feat-spotify" href="${su}" target="_blank" rel="noopener">${SPOTIFY_ICON} Spotify</a>`;
    if (aw && au) aw.innerHTML = `<a class="feat-apple"   href="${au}" target="_blank" rel="noopener">${APPLE_ICON} Apple Music</a>`;
  }

  function scrollToRow(key) {
    const row = document.getElementById(`row-${key}`);
    if (!row) return;
    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
    row.classList.remove('row-highlight');
    void row.offsetWidth;
    row.classList.add('row-highlight');
  }

  // ── DOM HELPERS ──────────────────────────────────────────────
  const toResolve = new Map();
  const keyMeta   = new Map();

  function makeImgPair(pick) {
    const key = cacheKey(pick.artist, pick.title);
    toResolve.set(key, { artist: pick.artist, title: pick.title });
    keyMeta.set(key,   { artist: pick.artist, title: pick.title });
    const shimmer = document.createElement('div');
    shimmer.className = 'shimmer';
    const img = document.createElement('img');
    img.alt = `${pick.artist} – ${pick.title}`;
    img.dataset.key = key;
    img.addEventListener('error', () => { shimmer.style.display = 'none'; });
    return { shimmer, img };
  }

  function makeSingleCard(pick, person) {
    const key  = cacheKey(pick.artist, pick.title);
    const card = document.createElement('div');
    card.className = 'album-card is-linked';
    const { shimmer, img } = makeImgPair(pick);
    const overlay = document.createElement('div');
    overlay.className = 'album-overlay';
    overlay.innerHTML = `
      <div class="ov-person">${person}</div>
      <div class="ov-title">${pick.title}</div>
      <div class="ov-artist">${pick.artist}</div>
      ${pick.year ? `<div class="ov-year">${pick.year}</div>` : ''}
    `;
    card.appendChild(shimmer);
    card.appendChild(img);
    card.appendChild(overlay);
    card.addEventListener('click', () => scrollToRow(key));
    return card;
  }

  function makeSplitCard(picks, person) {
    const card = document.createElement('div');
    card.className = 'album-card--split is-linked';

    picks.forEach((pick, i) => {
      const half = document.createElement('div');
      half.className = `split-half split-half--${i === 0 ? 'a' : 'b'}`;
      const { shimmer, img } = makeImgPair(pick);
      half.appendChild(shimmer);
      half.appendChild(img);
      const key = cacheKey(pick.artist, pick.title);
      half.addEventListener('click', e => { e.stopPropagation(); scrollToRow(key); });
      card.appendChild(half);
    });

    const overlay = document.createElement('div');
    overlay.className = 'split-overlay';
    overlay.innerHTML = `
      <div class="ov-person">${person} · double</div>
      ${picks.map(p => `
        <div class="split-entry">
          <div class="ov-title">${p.title}</div>
          <div class="ov-artist">${p.artist}</div>
          ${p.year ? `<div class="ov-year">${p.year}</div>` : ''}
        </div>`).join('')}
    `;
    card.appendChild(overlay);
    return card;
  }

  function makeEmptyCard() {
    const card  = document.createElement('div');
    card.className = 'album-card album-card--empty';
    const empty = document.createElement('div');
    empty.className = 'empty-slot';
    empty.textContent = '—';
    card.appendChild(empty);
    return card;
  }

  // ── COUNTS ───────────────────────────────────────────────────
  const roundCount = Math.max(...COLLECTION.map(e => e.picks.length));
  const people     = COLLECTION.map(e => e.person);
  let   totalPicks = 0;
  COLLECTION.forEach(e => e.picks.forEach(p => { if (p) totalPicks += toArray(p).length; }));

  // ── FEATURED BLOCK ───────────────────────────────────────────
  let featuredPick = null, featuredPerson = null;
  COLLECTION.forEach(entry => {
    entry.picks.forEach(raw => {
      if (!raw) return;
      toArray(raw).forEach(pick => {
        if (!featuredPick || (pick.week ?? 0) > (featuredPick.week ?? 0)) {
          featuredPick = pick;
          featuredPerson = entry.person;
        }
      });
    });
  });

  if (featuredPick) {
    const featKey = cacheKey(featuredPick.artist, featuredPick.title);
    toResolve.set(featKey, { artist: featuredPick.artist, title: featuredPick.title });
    keyMeta.set(featKey,   { artist: featuredPick.artist, title: featuredPick.title });

    const artShimmer = document.createElement('div');
    artShimmer.className = 'shimmer';
    const artImg = document.createElement('img');
    artImg.alt = `${featuredPick.artist} – ${featuredPick.title}`;
    artImg.dataset.key = featKey;
    artImg.addEventListener('error', () => { artShimmer.style.display = 'none'; });
    const artWrap = document.createElement('div');
    artWrap.className = 'featured-art';
    artWrap.appendChild(artShimmer);
    artWrap.appendChild(artImg);

    const linksEl = document.createElement('div');
    linksEl.className = 'featured-links';
    linksEl.dataset.spotkey = featKey;
    linksEl.innerHTML = `
      <span class="feat-spot-wrap"><span class="featured-links-pending">…</span></span>
      <span class="feat-apple-wrap"><span class="featured-links-pending">…</span></span>
    `;

    const featured = document.getElementById('featured');
    featured.className = 'featured';
    [
      Object.assign(document.createElement('div'), { className: 'featured-label',  textContent: "This Week's Album" }),
      artWrap,
      Object.assign(document.createElement('div'), { className: 'featured-artist', textContent: featuredPick.artist.toUpperCase() }),
      Object.assign(document.createElement('div'), { className: 'featured-title',  textContent: featuredPick.title }),
      Object.assign(document.createElement('div'), { className: 'featured-person', textContent: `picked by ${featuredPerson}` }),
      linksEl,
    ].forEach(el => featured.appendChild(el));
  }

  // ── GRID ─────────────────────────────────────────────────────
  const app  = document.getElementById('app');
  const grid = document.createElement('div');
  grid.className = 'rounds-grid';

  for (let r = 0; r < roundCount; r++) {
    const divider = document.createElement('div');
    divider.className = 'round-divider';
    divider.innerHTML = `<span>Round ${r + 1}</span><hr>`;
    grid.appendChild(divider);

    [...COLLECTION].sort((a, b) => {
      const wa = a.picks[r] ? Math.min(...toArray(a.picks[r]).map(p => p.week ?? Infinity)) : Infinity;
      const wb = b.picks[r] ? Math.min(...toArray(b.picks[r]).map(p => p.week ?? Infinity)) : Infinity;
      return wa - wb;
    }).forEach(entry => {
      const pick = entry.picks[r] ?? null;
      grid.appendChild(
        !pick          ? makeEmptyCard() :
        isDouble(pick) ? makeSplitCard(pick, entry.person) :
                         makeSingleCard(pick, entry.person)
      );
    });
  }
  app.appendChild(grid);

  // ── TABLE ────────────────────────────────────────────────────
  const tableSection = document.getElementById('table-section');
  const h2 = document.createElement('h2');
  h2.textContent = 'All Picks';
  tableSection.appendChild(h2);

  const table = document.createElement('table');
  table.className = 'picks-table';
  table.innerHTML = `
    <thead><tr>
      <th></th>
      <th class="sortable" data-col="week">Week</th>
      <th class="sortable col-round" data-col="round">Round</th>
      <th class="sortable" data-col="person">Person</th>
      <th class="sortable" data-col="artist">Artist</th>
      <th class="sortable" data-col="album">Album</th>
      <th class="sortable col-genre" data-col="genre">Genre</th>
      <th class="sortable col-year" data-col="year">Year</th>
      <th class="sortable" data-col="avg">Avg</th>
    </tr></thead>
    <tbody id="table-body"></tbody>
  `;
  tableSection.appendChild(table);
  const tbody = table.querySelector('#table-body');

  const allRows = [];
  for (let r = 0; r < roundCount; r++) {
    COLLECTION.forEach(entry => {
      const raw = entry.picks[r] ?? null;
      if (raw) toArray(raw).forEach(pick =>
        allRows.push({ pick, person: entry.person, round: r + 1, double: isDouble(raw) })
      );
    });
  }

  // Current sort state
  let sortCol = 'week', sortDir = 1; // 1 = asc, -1 = desc

  function rowValue(row, col) {
    switch (col) {
      case 'week':   return row.pick?.week ?? Infinity;
      case 'round':  return row.round;
      case 'person': return row.person.toLowerCase();
      case 'artist': return row.pick.artist.toLowerCase();
      case 'album':  return row.pick.title.toLowerCase();
      case 'genre':  return (row.pick.genre || '').toLowerCase();
      case 'year':   return row.pick?.year ?? 0;
      case 'avg':    return row.avg ?? -Infinity;
      default:       return '';
    }
  }

  function buildRow({ pick, person, round, double: dbl }) {
    const tr = document.createElement('tr');
    tr.id = `row-${cacheKey(pick.artist, pick.title)}`;
    if (dbl) tr.classList.add('row-double');

    const { shimmer, img } = makeImgPair(pick);
    shimmer.className = 'shimmer table-thumb-shimmer';
    img.className     = 'table-thumb';
    const thumbTd = document.createElement('td');
    thumbTd.appendChild(shimmer);
    thumbTd.appendChild(img);

    const personTd = document.createElement('td');
    personTd.className   = 'td-person';
    personTd.textContent = person;
    if (dbl) personTd.innerHTML += `<span class="td-double-badge">double</span>`;

    // Look up scores by week+artist, falling back to week alone
    const weekScores = pick.week
      ? (SCORES.get(`${pick.week}|${pick.artist.toLowerCase()}`) ?? SCORES.get(String(pick.week)) ?? null)
      : null;
    let avg = null;
    if (weekScores) {
      const vals = Object.values(weekScores).filter(v => v !== null);
      avg = vals.length ? parseFloat((vals.reduce((s, v) => s + v, 0) / vals.length).toFixed(2)) : null;
    }

    [
      thumbTd,
      Object.assign(document.createElement('td'), { className: 'td-week',              textContent: pick.week ?? '—' }),
      Object.assign(document.createElement('td'), { className: 'td-round col-round',   textContent: `R${round}` }),
      personTd,
      Object.assign(document.createElement('td'), { className: 'td-artist',            textContent: pick.artist }),
      Object.assign(document.createElement('td'), { className: 'td-album',             textContent: pick.title }),
      Object.assign(document.createElement('td'), { className: 'td-genre col-genre',   textContent: pick.genre || '—' }),
      Object.assign(document.createElement('td'), { className: 'td-year col-year',     textContent: pick.year ?? '—' }),
      Object.assign(document.createElement('td'), { className: 'td-avg',               textContent: avg ?? '—' }),
    ].forEach(td => tr.appendChild(td));

    // ── Score expansion row ──
    const scoreTr = document.createElement('tr');
    scoreTr.className = 'score-row';
    const scoreTd = document.createElement('td');
    scoreTd.colSpan = 9;
    const scoreInner = document.createElement('div');
    scoreInner.className = 'score-row-inner';

    if (weekScores) {
      tr.classList.add('has-scores');
      Object.entries(weekScores).forEach(([label, val]) => {
        const chip = document.createElement('div');
        chip.className = 'score-chip';
        const isNull = val === null;
        chip.innerHTML = `
          <span class="chip-label">${label}</span>
          <span class="chip-value${isNull ? ' chip-none' : ''}">${isNull ? '—' : val}</span>
        `;
        scoreInner.appendChild(chip);
      });

      tr.addEventListener('click', () => {
        const open = scoreInner.classList.toggle('visible');
        tr.classList.toggle('row-expanded', open);
      });
    }

    scoreTd.appendChild(scoreInner);
    scoreTr.appendChild(scoreTd);

    return { tr, scoreTr, avg };
  }

  // Build all rows once — re-sorting moves existing nodes, preserving loaded images
  const builtRows = allRows.map(row => {
    const built = buildRow(row);
    return { ...row, tr: built.tr, scoreTr: built.scoreTr, avg: built.avg };
  });

  function renderTable() {
    const sorted = [...builtRows].sort((a, b) => {
      const va = rowValue(a, sortCol);
      const vb = rowValue(b, sortCol);
      if (va < vb) return -sortDir;
      if (va > vb) return  sortDir;
      return 0;
    });
    sorted.forEach(row => {
      tbody.appendChild(row.tr);
      tbody.appendChild(row.scoreTr);
    });
  }

  // Sort on header click — 1st click: asc, 2nd: desc, 3rd: reset to default
  table.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        if (sortDir === 1) {
          sortDir = -1;
        } else {
          // Third click — reset to default (week asc)
          sortCol = 'week';
          sortDir = 1;
        }
      } else {
        sortCol = col;
        sortDir = 1;
      }
      table.querySelectorAll('th.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
      const activeCol = table.querySelector(`th[data-col="${sortCol}"]`);
      activeCol.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
      renderTable();
    });
  });

  // Initial render sorted by week asc, mark the header
  table.querySelector('th[data-col="week"]').classList.add('sort-asc');
  renderTable();

  // ── STATS ────────────────────────────────────────────────────
  const allPicks   = allRows.map(r => r.pick);
  const soloCount  = allPicks.filter(p => p.group === '0').length;
  const groupCount = allPicks.filter(p => p.group === '1').length;

  const genreCounts = {};
  allPicks.forEach(p => {
    if (p.genre) genreCounts[p.genre] = (genreCounts[p.genre] || 0) + 1;
  });
  const topGenre = Object.entries(genreCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';

  const decadeCounts = {};
  allPicks.forEach(p => {
    if (p.decade) decadeCounts[p.decade] = (decadeCounts[p.decade] || 0) + 1;
  });
  const topDecade = Object.entries(decadeCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';

  // Flatten all individual score values from SCORES map
  const allScoreValues = [];
  SCORES.forEach(entry => {
    Object.values(entry).forEach(v => { if (v !== null) allScoreValues.push(v); });
  });
  const highScore = allScoreValues.length ? Math.max(...allScoreValues) : '—';
  const lowScore  = allScoreValues.length ? Math.min(...allScoreValues) : '—';

  const statsSection = document.getElementById('stats-section');
  [
    { label: 'Solo Artists',       value: soloCount  },
    { label: 'Groups',             value: groupCount },
    { label: 'Most Popular Genre', value: topGenre   },
    { label: 'Most Popular Decade',value: topDecade  },
    { label: 'Highest Score',      value: highScore  },
    { label: 'Lowest Score',       value: lowScore   },
  ].forEach(({ label, value }) => {
    const el = document.createElement('div');
    el.className = 'stat-item';
    el.innerHTML = `<strong>${value}</strong>${label}`;
    statsSection.appendChild(el);
  });

  // ── COVER RESOLUTION ─────────────────────────────────────────
  // Featured album resolves first. Main queue starts only after it completes.
  const featuredKey = featuredPick ? cacheKey(featuredPick.artist, featuredPick.title) : null;
  const queue = [...toResolve.entries()].filter(([k]) => k !== featuredKey);
  let qi = 0;

  function fromCache(artist, title, size = 'large') {
    const cc = getLS(covKey(artist, title, size));
    const sc = getLS(spotKey(artist, title));
    const ac = getLS(appleKey(artist, title));
    if (cc === null || sc === null || ac === null) return null;
    return {
      cover:   cc === 'NONE' ? null : cc,
      spotify: sc === 'NONE' ? spotifySearchUrl(artist, title)   : sc,
      apple:   ac === 'NONE' ? appleMusicSearchUrl(artist, title) : ac,
    };
  }

  function applyAll(key, { cover, spotify, apple }) {
    applyCovers(key, cover);
    applySpotify(key, spotify);
    applyAppleMusic(key, apple);
    updateFeaturedLinks(key);
  }

  function resolveNext() {
    if (qi >= queue.length) return;
    const [key, { artist, title }] = queue[qi++];
    const cached = fromCache(artist, title);
    if (cached) {
      applyAll(key, cached);
      resolveNext();
    } else {
      fetchAlbumData(artist, title).then(data => {
        applyAll(key, data);
        setTimeout(resolveNext, 1100);
      });
    }
  }

  if (featuredKey && featuredPick) {
    const { artist, title } = featuredPick;
    const cached = fromCache(artist, title, 'extralarge');
    if (cached) {
      applyAll(featuredKey, cached);
      resolveNext();
    } else {
      fetchAlbumData(artist, title, 'extralarge').then(data => {
        applyAll(featuredKey, data);
        setTimeout(resolveNext, 1100);
      });
    }
  } else {
    resolveNext();
  }

} // end render()

const now = new Date();
document.getElementById('footer-year').textContent  = now.getFullYear();
document.getElementById('last-updated').textContent = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
</script>

</body>
</html>
